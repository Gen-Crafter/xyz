services:
  # FastAPI Backend
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://aigp:aigp_password@postgres:5432/aigp_db
      - REDIS_URL=redis://redis:6379
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - CHROMA_COLLECTION=aigp_regulations
      - CORS_ORIGINS=http://localhost:4200,http://*
      - AUTH_TOKEN=demo-token-for-hackathon
      - LOG_LEVEL=INFO
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:3b
      - LLM_TEMPERATURE=0.1
      - LLM_MAX_TOKENS=1500
      - LLM_MAX_RETRIES=2
      - LLM_REQUEST_TIMEOUT_SECONDS=120
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - RAG_EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2
      - RAG_TOP_K=5
      - HF_HUB_DISABLE_XET=1
      - HF_HUB_DISABLE_TELEMETRY=1
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      chromadb:
        condition: service_started
      ollama:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - hf_cache:/root/.cache/huggingface
    restart: unless-stopped

  # Ollama — local open-source LLM (no auth required)
  # Auto-pulls the model on first startup via entrypoint script.
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_MODEL=llama3.2:3b
      - SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt
      - REQUESTS_CA_BUNDLE=/etc/ssl/certs/ca-certificates.crt
    entrypoint: ["/bin/sh", "/ollama-entrypoint.sh"]
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama-entrypoint.sh:/ollama-entrypoint.sh:ro
      # Optional: mount a corporate CA bundle if needed
      # - /usr/local/share/ca-certificates/Corp_CA_bundle.crt:/usr/local/share/ca-certificates/Corp_CA_bundle.crt:ro
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q 'llama3.2:3b' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

  # MITM Proxy — intercepts real AI traffic for compliance checking
  mitm-proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./proxy/mitm_addon.py:/proxy/mitm_addon.py
      # Optional: mount a corporate CA bundle if needed
      # - /usr/local/share/ca-certificates/Corp_CA_bundle.crt:/usr/local/share/ca-certificates/Corp_CA_bundle.crt:ro
    environment:
      - SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt
      - REQUESTS_CA_BUNDLE=/etc/ssl/certs/ca-certificates.crt
      - PYTHONUNBUFFERED=1
    command: ["sh", "-c", "update-ca-certificates 2>/dev/null && exec mitmdump -s mitm_addon.py --listen-port 8080 --set api_url=http://api:8000 --set ssl_insecure=true"]
    depends_on:
      - api
    restart: unless-stopped

  # Angular Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - api
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=aigp
      - POSTGRES_PASSWORD=aigp_password
      - POSTGRES_DB=aigp_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  # ChromaDB
  chromadb:
    image: chromadb/chroma:1.5.1
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=False
    restart: unless-stopped

volumes:
  postgres_data:
  chroma_data:
  ollama_data:
  hf_cache:
