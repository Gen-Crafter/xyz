resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name ai.gencrafter.io;

    location ^~ /.well-known/acme-challenge/ {
        alias /var/www/certbot/.well-known/acme-challenge/;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name ai.gencrafter.io;

    ssl_certificate /etc/letsencrypt/live/ai.gencrafter.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai.gencrafter.io/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    root /usr/share/nginx/html;
    index index.html;

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        set $api_upstream api:8000;
        proxy_pass http://$api_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_read_timeout 120s;
    }

    location /ws/ {
        set $api_upstream api:8000;
        proxy_pass http://$api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    location /health {
        set $api_upstream api:8000;
        proxy_pass http://$api_upstream/health;
        proxy_set_header Host $host;
    }

    location /docs {
        set $api_upstream api:8000;
        proxy_pass http://$api_upstream$request_uri;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        set $api_upstream api:8000;
        proxy_pass http://$api_upstream/openapi.json;
        proxy_set_header Host $host;
    }
}